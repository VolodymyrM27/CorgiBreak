name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
            if [ -z "$LATEST" ]; then
              VERSION="v1.0.0"
            else
              # Strip 'v' prefix, split into major.minor.patch, bump patch
              SEMVER="${LATEST#v}"
              MAJOR=$(echo "$SEMVER" | cut -d. -f1)
              MINOR=$(echo "$SEMVER" | cut -d. -f2)
              PATCH=$(echo "$SEMVER" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
            # Create and push the new tag
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project CorgiBreak.xcodeproj \
            -scheme CorgiBreak \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Sign and package app
        run: |
          codesign --force --deep --sign - build/Build/Products/Release/CorgiBreak.app
          cd build/Build/Products/Release
          zip -r CorgiBreak.zip CorgiBreak.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            build/Build/Products/Release/CorgiBreak.zip \
            --title "$VERSION" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          SHA256=$(shasum -a 256 build/Build/Products/Release/CorgiBreak.zip | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/VolodymyrM27/homebrew-corgibreak.git tap
          mkdir -p tap/Casks

          cat > tap/Casks/corgibreak.rb << EOF
          cask "corgibreak" do
            version "$VERSION_NUM"
            sha256 "$SHA256"

            url "https://github.com/VolodymyrM27/CorgiBreak/releases/download/v#{version}/CorgiBreak.zip"
            name "CorgiBreak"
            desc "Menu bar app for the 20-20-20 eye care rule with an animated pixel corgi"
            homepage "https://github.com/VolodymyrM27/CorgiBreak"

            app "CorgiBreak.app"

            caveats <<~EOS
              CorgiBreak is not notarized. To install, use:
                brew install --no-quarantine #{token}
              If you already installed without --no-quarantine, run:
                xattr -d com.apple.quarantine "#{appdir}/CorgiBreak.app"
            EOS

            zap trash: [
              "~/Library/Preferences/com.corgibreak.app.plist",
            ]
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update corgibreak to $VERSION_NUM" || exit 0
          git push
